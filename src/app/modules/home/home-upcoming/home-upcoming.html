<section class="home-section home-upcoming"
  [ngStyle]="{'background-image':'url(' + bgImage + ')'}">
  <section class="upcoming">
    <header class="upcoming-header">
      <h2>
        <fa-icon [icon]="calendarIcon"></fa-icon>
        Upcoming
      </h2>
    </header>
    <main class="upcoming-main">
      <ngb-carousel>
        @for (movie of movieResults; track $index) {
          <ng-template ngbSlide>
            <div class="slide-image">
              <a [routerLink]="['movie', movie.id]">
                <div
                  class="carousel-slide"
                  [ngStyle]="{ 'background-image': 'url(' + movie.backdrop_path + ')' }"
                ></div>
              </a>
            </div>
            <div class="carousel-caption">
              <h3>{{ movie.title }}</h3>
            </div>
          </ng-template>
        }
      </ngb-carousel>
    </main>
  </section>
</section>
