<section class="movie-overview-main-cast">
  <h3>Main Cast</h3>
  @if (movieMainCast.length == 0) {
    <p>This movie has no recognizable cast</p>
  }
  @if (movieMainCast.length > 0) {
    <div class="table-responsive">
      <table class="table">
        <tbody>
          <tr>
            <td>Starring:</td>
            <td class="text-end">
              @for (cast of movieMainCast; track cast) {
                <a [routerLink]="['/person', cast.id]">
                  {{ cast.name }}
                </a>
                <br />
              }
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  }
</section>
