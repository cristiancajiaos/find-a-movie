
@if (movieImages.length > 0) {
  <section class="movie-overview-images">
    <h2>Images</h2>
    <ngb-carousel [interval]="0">
      @for (image of movieImages; track $index) {
        <ng-template ngbSlide>
          <img [src]="image.file_path" class="d-block w-100" alt="Image {{$index}}">
        </ng-template>
      }
    </ngb-carousel>
  </section>
}
