<section class="person-header">
  <header [ngStyle]="{backgroundImage: 'url(' + bgImage + ')'}">
    <div class="row align-items-lg-center">
      <div class="col-12 col-lg-2">
        <img
          class="person-header-profile-img"
          [src]="profileImg"
          [alt]="profileImgAltText"
          />
        </div>
        <div class="col-12 col-lg-10">
          <h1>
            <fa-icon [icon]="user"></fa-icon>
            {{ name }}
            <small>
              @if (this.person.birthday || this.person.deathday) {
                ({{ birthYear }} -
                @if (this.person.deathday) {
                  {{ deathYear }})
                } @else {
                  )
                }
              }
              </small>
            </h1>
            <h2><fa-icon [icon]="film"></fa-icon> Known for: {{ knownFor }}</h2>
          </div>
        </div>
      </header>
    </section>
