<section class="person-cast-credit-list">
  <a [routerLink]="['/movie', castRole.id]">
    <div class="list-content">
      <img [src]="posterSizeSmall" [alt]="altPosterText" />
      <div class="list-detail">
        <span class="list-formatted-title">
          {{formattedTitle}}
        </span>
        <br />
        <span>
          <ng-container *ngIf="castRole.character">as {{ castRole.character }}</ng-container>
          <ng-container *ngIf="!castRole.character">No Role Defined</ng-container>
        </span>
      </div>
    </div>
  </a>
</section>
