<a ngbDropdownItem
  class="movie-result"
  [routerLink]="['movie', movieResult.id]"
  (click)="onClickResult()">
  <span class="movie-poster">
    <div class="movie-poster-img" [ngStyle]="{'background-image': 'url(' + posterSizeSmall + ')'}"></div>
  </span>
  <span class="movie-formatted-title">
    {{formattedTitle}}
  </span>
</a>
