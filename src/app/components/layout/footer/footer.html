<footer class="bg-dark text-white">
  <div class="row">
    <div class="col-12 col-lg-8">
      &#169; Cristian Cajiao Skarnic,
      <ng-container
        *ngTemplateOutlet="creationYear == currentYear ? year : rangeYears"
      ></ng-container>
      <br />
      Uses the
      <a href="https://www.themoviedb.org/" target="_blank">
        <img class="tmdb-logo" src="img/tmdb-logo.svg" alt="TMDB Logo" />
      </a>
      API
    </div>
    <div class="col-12 col-lg-4 text-start text-lg-end">
      App version: {{ appVersion }}
    </div>
  </div>
</footer>

<ng-template #year>
  {{ currentYear }}
</ng-template>
<ng-template #rangeYears> {{ creationYear }} - {{ currentYear }} </ng-template>
