<section class="movie-crew">
  <ng-container *ngIf="loadingCrew">
    <app-loading-inline message="Loading crew..."></app-loading-inline>
  </ng-container>
  <ng-container *ngIf="!loadingCrew">
    <p>{{ movieCrew | json }}</p>

    <hr />

    <div class="d-grid">
      <a routerLink="../full-crew" class="btn btn-primary mb-2"> See Full Crew </a>
    </div>
  </ng-container>
</section>
